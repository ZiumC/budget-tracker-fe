<div class="width-wrapper">
  <div class="component-wrapper component-bg">
    <div class="input-group mt-3 mb-5">
      <input type="text"
             class="form-control"
             placeholder="Search phrase..."
             aria-label="Search phrase..."
             aria-describedby="basic-addon2">
      <div class="input-group-append">
        <button id="clear-btn"
                class="btn btn-outline-danger"
                type="button"
                data-bs-toggle="tooltip"
                data-bs-placement="bottom"
                title="Clear">
          <i class="bi bi-x-circle"></i>
        </button>
      </div>
    </div>
    <div class="row">
      <div id="needs-column" class="col mb-3">
        <app-category [displayName]="'Needs category'"
                      [type]="CategoryType.NEEDS">

        </app-category>
      </div>
      <div id="wants-column" class="col mb-3">
        <app-category [displayName]="'Wants category'"
                      [type]="CategoryType.WANTS">

        </app-category>
      </div>
      <div id="savings-column" class="col mb-3">
        <app-category [displayName]="'Savings category'"
                      [type]="CategoryType.SAVINGS">

        </app-category>
      </div>
    </div>
  </div>
</div>
