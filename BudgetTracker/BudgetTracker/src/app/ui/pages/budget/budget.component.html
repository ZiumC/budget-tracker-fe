<div class="height-wrapper width-wrapper">
  <div class="component-wrapper component-bg">
    <div class="card text-center mb-3">
      <div class="card-body">
        <ng-template [ngIf]="!loaders.budget"
                     [ngIfElse]="loadedBudgetBlock">
          <app-spinner-grow></app-spinner-grow>
        </ng-template>
        <ng-template #loadedBudgetBlock>
          <ng-template [ngIf]="responseModels.budget.statusCode == appConfig.response.required.budgetStatus"
                       [ngIfElse]="budgetErrorBlock">
            <h5 class="card-title">{{ budgetDto?.name }}</h5>
            <table>
              <tr>
                <td>Date start:</td>
                <td>
                  <input type="text"
                         class="form-control"
                         value="{{DateUtils.format(budgetDto?.dateStart)}}"
                         disabled>
                </td>
              </tr>
              <tr>
                <td>Date end:</td>
                <td>
                  <input type="text"
                         class="form-control"
                         value="{{DateUtils.format(budgetDto?.dateEnd)}}"
                         disabled>
                </td>
              </tr>
            </table>
            <div class="budget-buttons mt-3 mb-1 text-center">
              <button type="button"
                      class="btn btn-success"
                      data-bs-toggle="tooltip"
                      data-bs-placement="bottom"
                      title="Add payment"
                      (click)="paymentModal.open()">
                <i class="bi bi-coin"></i> Payment
              </button>
              <button type="button"
                      class="btn btn-success"
                      data-bs-toggle="tooltip"
                      data-bs-placement="bottom"
                      title="Add income"
                      (click)="incomeModal.open()">
                <i class="bi bi-cash-coin"></i> Income
              </button>
              <button type="button"
                      class="btn btn-danger"
                      data-bs-toggle="tooltip"
                      data-bs-placement="bottom"
                      title="Delete budget"
                      (click)="deleteModal.openWithBudget(budgetDto!)">
                <i class="bi bi-trash3-fill"></i> Delete
              </button>
            </div>
          </ng-template>
          <ng-template #budgetErrorBlock>
            <app-error [response]="responseModels.budget"
                       [notFoundErrorText]="formatString(appConfig.form.messages.notFound,'Budget data')">

            </app-error>
          </ng-template>
        </ng-template>
      </div>
    </div>
    <div class="card text-center mb-3">
      <div class="card-header">
        Incomes
      </div>
      <div id="incomes-card" class="card-body">
        <ng-template [ngIf]="!loaders.incomes"
                     [ngIfElse]="loadedIncomesBlock">
          <app-spinner-grow></app-spinner-grow>
        </ng-template>
        <ng-template #loadedIncomesBlock>
          <ng-template [ngIf]="responseModels.incomes.statusCode == appConfig.response.required.incomeStatus"
                       [ngIfElse]="errorIncomesBlock">
            <div class="mb-3">
              <app-order [name]="'income-order'"
                         [orderTypes]="[
                            ORDER_TYPES.DATE_UPDATED,
                            ORDER_TYPES.WAGE,
                            ORDER_TYPES.SURPLUS_FIRST]">

              </app-order>
            </div>
            @for (income of incomesDto; track income) {
              <div ngbAccordion>
                <div ngbAccordionItem
                     [collapsed]="selectedIncome !== income"
                     [class.surplus-border]="income.isSurplus">
                  <h2 ngbAccordionHeader>
                    <button ngbAccordionButton
                            (click)="selectedIncome = income"
                            class="light-gray-bg accordion-button-header">
                      <table>
                        <tr class="table-header">
                          <th>Name</th>
                          <th>Income (PLN)</th>
                          <th [style.display]="innerWidth > appConfig.mobileWidth ? '' : 'none'">
                            Appropriation
                          </th>
                          <th [style.display]="innerWidth > appConfig.mobileWidth ? '' : 'none'">
                            Date created
                          </th>
                        </tr>
                        <tr>
                          <td>{{ income.name }}</td>
                          <td>{{ format(income.wage) }}</td>
                          <td [style.display]="innerWidth > appConfig.mobileWidth ? '' : 'none'">
                            #Category
                          </td>
                          <td [style.display]="innerWidth > appConfig.mobileWidth ? '' : 'none'">
                            {{ DateUtils.format(income.dateUpdated) }}
                          </td>
                        </tr>
                      </table>
                    </button>
                  </h2>
                  <div ngbAccordionCollapse>
                    <div ngbAccordionBody class="text-center">
                      <div class="row">
                        <div [style.display]="income.isSurplus ? 'block' : 'none'"
                             class="col-lg-6 mb-2 condition-container">
                          <p>Income is surplus</p>
                        </div>
                        <div [style.display]="innerWidth > appConfig.mobileWidth ? 'none' : ''"
                             class="mb-3 condition-container">
                          <div class="form-group">
                            <label for="payment-date-updated">Category
                            </label>
                            <input type="text"
                                   id="income-category"
                                   class="form-control mb-2"
                                   value="#category"
                                   disabled>
                            <label for="payment-date-updated">Date updated
                            </label>
                            <input type="text"
                                   id="income-date-updated"
                                   class="form-control mb-2"
                                   value="{{DateUtils.formatWithTime(income.dateUpdated)}}"
                                   disabled>
                          </div>
                        </div>
                        <div [class.col-lg-6]="income.isSurplus"
                             class="buttons-container">
                          <div class="income-buttons text-center">
                            <button
                              type="button"
                              class="btn btn-warning"
                              data-bs-toggle="tooltip"
                              data-bs-placement="bottom"
                              title="Edit income"
                              (click)="incomeModal.open(income)">
                              <i class="bi bi-pencil-square"></i> Edit
                            </button>
                            <button
                              type="button"
                              class="btn btn-danger"
                              data-bs-toggle="tooltip"
                              data-bs-placement="bottom"
                              title="Delete income"
                              (click)="deleteModal.openWithIncome(income)">
                              <i class="bi bi-trash3-fill"></i> Delete
                            </button>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            }
            @if (incomeTotalPages! > 0) {
              <app-pagination [name]="'income-paginate'"
                              [pageCount]="incomeTotalPages!"
                              [displayPageSize]="true"
                              [pageSizeOptions]="appConfig.request.pagination.defaultPageSizeOptions"
                              (pageSizeEvent)="onPageSizeEvent($event, true)"
                              (pageEvent)="onPageEvent($event, true)">

              </app-pagination>
            }
          </ng-template>
          <ng-template #errorIncomesBlock>
            <app-error [response]="responseModels.incomes"
                       [notFoundErrorText]="formatString(appConfig.form.messages.notFound,'Incomes data')">

            </app-error>
          </ng-template>
        </ng-template>
      </div>
    </div>
    <div class="card text-center mb-lg-3">
      <div class="card-header">
        Payments
      </div>
      <div id="payments-card" class="card-body">
        <ng-template [ngIf]="!loaders.payments"
                     [ngIfElse]="loadedPaymentsBlock">
          <app-spinner-grow></app-spinner-grow>
        </ng-template>
        <ng-template #loadedPaymentsBlock>
          <ng-template [ngIf]="responseModels.payments.statusCode == appConfig.response.required.paymentStatus"
                       [ngIfElse]="errorPaymentsBlock">
            <div class="mb-3">
              <app-order [name]="'payment-order'"
                         [orderTypes]="[
                            ORDER_TYPES.DATE_UPDATED,
                            ORDER_TYPES.PRICE,
                            ORDER_TYPES.REFUND,
                            ORDER_TYPES.REAL_COST,
                            ORDER_TYPES.PAID_FIRST]">

              </app-order>
            </div>
            @for (payment of paymentsDto; track payment) {
              <div ngbAccordion>
                <div ngbAccordionItem
                     [collapsed]="selectedPayment !== payment"
                     [class.payment-border]="payment.isPaid">
                  <h2 ngbAccordionHeader>
                    <button ngbAccordionButton
                            (click)="selectedPayment = payment"
                            class="light-gray-bg accordion-button-header">
                      <table>
                        <tr class="table-header">
                          <th>Name</th>
                          <th [style.display]="innerWidth > appConfig.mobileWidth ? '' : 'none'">
                            Price (PLN)
                          </th>
                          <th [style.display]="innerWidth > appConfig.mobileWidth ? '' : 'none'">
                            Refund (PLN)
                          </th>
                          <th>Real (PLN)</th>
                        </tr>
                        <tr>
                          <td>{{ payment.name }}</td>
                          <td [style.display]="innerWidth > appConfig.mobileWidth ? '' : 'none'">
                            {{ format(payment.price) }}
                          </td>
                          <td [style.display]="innerWidth > appConfig.mobileWidth ? '' : 'none'">
                            {{ format(payment.refund) }}
                          </td>
                          <td>{{ format(subtract(payment.price, payment.refund)) }}</td>
                        </tr>
                      </table>
                    </button>
                  </h2>
                  <div ngbAccordionCollapse>
                    <div ngbAccordionBody>
                      <div class="row">
                        <div class="col-lg-6">
                          <div [style.display]="payment.isPaid ? 'block' : 'none'"
                               class="mb-2 condition-container text-center">
                            <h6>Payment is paid</h6>
                          </div>
                          <div class="mb-3 condition-container">
                            <div class="form-group">
                              <div [style.display]="innerWidth > appConfig.mobileWidth ? 'none' : ''">
                                <label for="payment-price">Price (PLN)
                                </label>
                                <input type="text"
                                       id="payment-price"
                                       class="form-control mb-2"
                                       value="{{ format(payment.price) }}"
                                       disabled>
                                <label for="payment-refund">Refund (PLN)
                                </label>
                                <input type="text"
                                       id="payment-refund"
                                       class="form-control mb-2"
                                       value="{{ format(payment.refund) }}"
                                       disabled>
                              </div>
                              <label for="payment-date-updated">Category
                              </label>
                              <input type="text"
                                     id="payment-category"
                                     class="form-control mb-2"
                                     value="#category"
                                     disabled>
                              <label for="payment-date-updated">Date updated
                              </label>
                              <input type="text"
                                     id="payment-date-updated"
                                     class="form-control mb-2"
                                     value="{{DateUtils.formatWithTime(payment.dateUpdated)}}"
                                     disabled>
                              <label for="payment-comment">Comment</label>
                              <textarea type="text"
                                        id="payment-comment"
                                        class="form-control"
                                        value="{{ payment.comment }}"
                                        disabled>
                                </textarea>
                            </div>
                          </div>
                        </div>
                        <div class="col-lg-6 buttons-container">
                          <div class="payment-buttons text-center">
                            <button
                              [style.display]="payment.isPaid ? 'block' : 'none'"
                              type="button"
                              class="btn btn-primary"
                              data-bs-toggle="tooltip"
                              data-bs-placement="bottom"
                              title="Switch to not paid status"
                              (click)="patchPaymentStatus(false, payment.id)">
                              @if (loaders.paymentStatusBtn) {
                                <div class="spinner-border spinner-border-sm text-light" role="status">
                                </div>
                              } @else {
                                <i class="bi bi-bag-x-fill"></i> Unpaid
                              }
                            </button>
                            <button
                              [style.display]="!payment.isPaid ? 'block' : 'none'"
                              type="button"
                              class="btn btn-secondary"
                              data-bs-toggle="tooltip"
                              data-bs-placement="bottom"
                              title="Switch to paid status"
                              (click)="patchPaymentStatus(true, payment.id)">
                              @if (loaders.paymentStatusBtn) {
                                <div class="spinner-border spinner-border-sm text-light" role="status">
                                </div>
                              } @else {
                                <i class="bi bi-bag-check-fill"></i> Paid
                              }
                            </button>
                            <button
                              type="button"
                              class="btn btn-warning"
                              data-bs-toggle="tooltip"
                              data-bs-placement="bottom"
                              title="Edit payment"
                              (click)="paymentModal.open(payment)">
                              <i class="bi bi-pencil-square"></i> Edit
                            </button>
                            <button
                              type="button"
                              class="btn btn-danger"
                              data-bs-toggle="tooltip"
                              data-bs-placement="bottom"
                              title="Delete payment"
                              (click)="deleteModal.openWithPayment(payment)">
                              <i class="bi bi-trash3-fill"></i> Delete
                            </button>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            }
            @if (paymentTotalPages! > 0) {
              <app-pagination [name]="'payment-paginate'"
                              [pageCount]="paymentTotalPages!"
                              [displayPageSize]="true"
                              [pageSizeOptions]="appConfig.request.pagination.defaultPageSizeOptions"
                              (pageSizeEvent)="onPageSizeEvent($event, false)"
                              (pageEvent)="onPageEvent($event, false)">

              </app-pagination>
            }
          </ng-template>
          <ng-template #errorPaymentsBlock>
            <app-error [response]=" responseModels.payments"
                       [notFoundErrorText]="formatString(appConfig.form.messages.notFound,'Payments data')">

            </app-error>
          </ng-template>
        </ng-template>
      </div>
    </div>
    <app-income-modal #incomeModal
                      [idBudget]="idBudget"
                      (refreshIncomeEvent)="onRefreshIncome()">

    </app-income-modal>
    <app-payment-modal #paymentModal
                       [idBudget]="idBudget"
                       (refreshPaymentEvent)="onRefreshPayment()">

    </app-payment-modal>
    <app-delete-modal #deleteModal
                      (indexPageEvent)="onRedirectToIndex()"
                      (refreshIncomeEvent)="onRefreshIncome()"
                      (refreshPaymentEvent)="onRefreshPayment()">

    </app-delete-modal>
  </div>
</div>
<app-error-modal #errorModal>
</app-error-modal>
