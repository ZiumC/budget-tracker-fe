<div class="height-wrapper width-wrapper">
  <div class="component-wrapper component-bg">
    <ng-template [ngIf]="!pageLoader.incomes" [ngIfElse]="loadedBlock">
      <app-spinner [size]="SpinnerSize.BIG"></app-spinner>
    </ng-template>
    <ng-template #loadedBlock>
      <ng-template [ngIf]="errorModels.incomes.responseStatusCode == requiredStatusCode.incomes" [ngIfElse]="errorBlock">
        @for (income of incomes; track income) {
          <div ngbAccordion>
            <div ngbAccordionItem
                 [collapsed]="selectedIncome !== income"
                 [class.surplus-border]="income.isSurplus">
              <h2 ngbAccordionHeader>
                <button ngbAccordionButton
                        (click)="selectedIncome = income"
                        class="light-gray-bg accordion-button-header">
                  <table>
                    <tr class="table-header">
                      <th>Name</th>
                      <th>Income (PLN)</th>
                      <th>Appropriation</th>
                      <th>Date created</th>
                    </tr>
                    <tr>
                      <th>{{ income.name }}</th>
                      <th>{{ NumberUtils.format(income.wage) }}</th>
                      <th>#Category</th>
                      <th>{{ DateUtils.format(income.dateUpdated) }}</th>
                    </tr>
                  </table>
                </button>
              </h2>
              <div ngbAccordionCollapse>
                <div ngbAccordionBody class="text-center">
                  <div class="row">
                    <div [style.display]="income.isSurplus ? 'block' : 'none'"
                         class="col-md-6 surplus-container">
                      <p>Income is surplus</p>
                    </div>
                    <div [class.col-md-6]="income.isSurplus">
                      <label
                        for="income-actions"
                        class="form-label group-label center-screen">Actions
                      </label>
                      <div
                        id="income-actions"
                        class="center-screen">
                        <button
                          type="button"
                          class="btn btn-outline-warning"
                          data-bs-toggle="tooltip"
                          data-bs-placement="bottom"
                          title="Edit">
                          <i class="bi bi-pencil-square"></i>
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        }
      </ng-template>
      <ng-template #errorBlock>
        <app-error [errorModel]="errorModels.incomes"></app-error>
      </ng-template>
    </ng-template>
  </div>
</div>
