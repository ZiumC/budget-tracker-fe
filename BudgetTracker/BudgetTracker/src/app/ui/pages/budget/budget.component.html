<div class="height-wrapper width-wrapper">
  <div class="component-wrapper component-bg">
    <ng-template [ngIf]="!isLoaded" [ngIfElse]="loadedBlock">
      <app-spinner [size]="SpinnerSize.BIG"></app-spinner>
    </ng-template>
    <ng-template #loadedBlock>
      <div ngbAccordion>
        <div ngbAccordionItem>
          <h2 ngbAccordionHeader>
            <button ngbAccordionButton
                    class="light-gray-bg accordion-button-header">
              <table>
                <tr class="table-header">
                  <th>Name</th>
                  <th>Income (PLN)</th>
                  <th>Appropriation</th>
                  <th>Date created</th>
                </tr>
                <tr>
                  <th>aaaa</th>
                  <th>#2137.00</th>
                  <th>#Savings</th>
                  <th>#12.12.2024</th>
                </tr>
              </table>
            </button>
          </h2>
          <div ngbAccordionCollapse>
            <div ngbAccordionBody class="text-center">
                <div class="row">
                  <label
                    for="income-actions"
                    class="form-label group-label center-screen">Actions
                  </label>
                  <div
                    id="income-actions"
                    class="center-screen">
                    <button
                      type="button"
                      class="btn btn-outline-warning"
                      data-bs-toggle="tooltip"
                      data-bs-placement="bottom"
                      title="Edit">
                      <i class="bi bi-pencil-square"></i>
                    </button>
                  </div>
                </div>
            </div>
          </div>
        </div>
      </div>
    </ng-template>
  </div>
</div>
