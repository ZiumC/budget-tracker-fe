<div class="height-wrapper width-wrapper">
  <div class="component-wrapper component-bg">
    <ng-template [ngIf]="errorModel.responseStatusCode == 200" [ngIfElse]="errorBlock">

      @for(budget of budgetsDto; track budget.id) {
      <div class="card border-dark mb-3" style="max-width: 18rem;">
        <div class="card-header">{{budget.name}}</div>
        <div class="card-body text-dark">
          <h5 class="card-title">Dark card title</h5>
          <p class="card-text">Some quick example text to build on the card title and make up the bulk of the card's content.</p>
        </div>
      </div>
      }
    </ng-template>
    <ng-template #errorBlock>
      error :(
      <p>{{errorModel.responseStatusCode}}</p>
    </ng-template>
  </div>
</div>
