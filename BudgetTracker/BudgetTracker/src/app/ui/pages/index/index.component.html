<div class="height-wrapper width-wrapper">
  <div class="component-wrapper component-bg">
    <div class="card mb-3">
      <div class="card-body">
        <div class="text-center ">
          <h3 class="card-title">Budgets</h3>
        </div>
        <form ngbAutofocus #form="ngForm">
          <div class="row">
            <div class="col-md-6">
              <div class="mb-2 mr-5">
                <div class="text-center">
                  <label for="from-date">From</label>
                </div>
                <div class="input-group">
                  <input
                    type="text"
                    id="from-date"
                    name="from-date"
                    class="form-control"
                    [(ngModel)]="fromDatePicker"
                    (ngModelChange)="validateDate(fromDate, toDate)"
                    required
                    #fromDate="ngModel"
                    container="body"
                    placement="bottom-end"
                    ngbDatepicker
                    #dateStart="ngbDatepicker"
                    [ngClass]="{
                    'is-invalid':
                      fromDate.invalid,
                    'is-valid': fromDate.valid }"/>
                  <div class="input-group-append">
                    <button class="btn btn-outline-secondary bi bi-calendar3"
                            (click)="dateStart.toggle()"
                            type="button">
                    </button>
                  </div>
                  @if (fromDate.invalid) {
                    <div class="invalid-feedback">
                      <label *ngIf="fromDate.errors?.['required']">
                        Field is required.
                      </label>
                      <label *ngIf="fromDate.errors?.['invalidDateRange']">
                        <strong>Date To</strong> can't be less or equal to <strong>Date from</strong>.
                      </label>
                      <label *ngIf="fromDate.errors?.['ngbDate']">
                        Date is invalid.
                      </label>
                    </div>
                  } @else if (fromDate.valid) {
                    <div class="valid-feedback pb-3">
                    </div>
                  } @else {
                    <div class="pb-4"></div>
                  }
                </div>
              </div>
            </div>
            <div class="col-md-6">
              <div class="text-center">
                <label for="to-date">To</label>
              </div>
              <div class="d-flex">
                <div class="input-group">
                  <input
                    id="to-date"
                    name="to-date"
                    class="form-control"
                    [(ngModel)]="toDatePicker"
                    (ngModelChange)="validateDate(fromDate, toDate)"
                    container="body"
                    placement="bottom-end"
                    required
                    #toDate="ngModel"
                    ngbDatepicker
                    #dateEnd="ngbDatepicker"
                    [ngClass]="{
                    'is-invalid':
                      toDate.invalid,
                    'is-valid': toDate.valid }"/>
                  <div class="input-group-append">
                    <button class="btn btn-outline-secondary bi bi-calendar3"
                            (click)="dateEnd.toggle()"
                            type="button">
                    </button>
                  </div>
                  @if (toDate.invalid) {
                    <div class="invalid-feedback">
                      <label *ngIf="toDate.errors?.['required']">
                        Field is required.
                      </label>
                      <label *ngIf="toDate.errors?.['invalidDateRange']">
                        <strong>Date To</strong> can't be less or equal to <strong>Date from</strong>.
                      </label>
                      <label *ngIf="toDate.errors?.['ngbDate']">
                        Date is invalid.
                      </label>
                    </div>
                  } @else if (toDate.valid) {
                    <div class="valid-feedback pb-3">
                    </div>
                  } @else {
                    <div class="pb-4"></div>
                  }
                </div>
                <div class="mx-1"></div>
                <div>
                  <button type="button"
                          class="btn btn-outline-secondary"
                          data-bs-toggle="tooltip"
                          data-bs-placement="bottom"
                          title="Search budgets"
                          (click)="onBudgetsSearch()"
                          [disabled]="form.invalid">
                    <i class="bi bi-search"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </form>
        <div class="budget-button-options mt-3 mb-1 text-center">
          <div class="px-5">
            <button type="button"
                    class="btn btn-success"
                    data-bs-toggle="tooltip"
                    data-bs-placement="bottom"
                    title="Create budget"
                    (click)="budgetModal.open()">
              <i class="bi bi-box"></i> Create
            </button>
          </div>
          <div class="px-5">
            <button type="button"
                    class="btn btn-success"
                    data-bs-toggle="tooltip"
                    data-bs-placement="bottom"
                    title="Create multiple budgets">
              <i class="bi bi-boxes"></i> Multiple
            </button>
          </div>
        </div>
      </div>
    </div>
    <ng-template [ngIf]="!loaders.page"
                 [ngIfElse]="loadedBlock">
      <div class="mt-5"></div>
      <app-spinner [size]="SpinnerSize.BIG"></app-spinner>
    </ng-template>
    <ng-template #loadedBlock>
      <ng-template [ngIf]="errorModels.budgets.responseStatusCode == requiredStatusCode"
                   [ngIfElse]="errorBudgetsBlock">
        <div class="budget-card-container">
          @for (budget of budgets; track budget.id; ) {
            <div class="card border-dark my-3 budget-card">
              <ng-template [ngIf]="!loaders.budget && budget.id == idRefreshBudget"
                           [ngIfElse]="displayBudget">
                <div class="mx-auto my-auto">
                  <div class="my-3 mx-3">
                    <app-spinner-grow></app-spinner-grow>
                  </div>
                </div>
              </ng-template>
              <ng-template #displayBudget>
                <div class="card-header">
                  <h5>{{ budget.name }}</h5>
                </div>
                <div class="card-body text-dark">
                  <table>
                    <tr>
                      <td>Date start:</td>
                      <td>
                        <input type="text"
                               class="form-control"
                               value="{{DateUtils.format(budget.dateStart)}}"
                               disabled>
                      </td>
                    </tr>
                    <tr>
                      <td>Date end:</td>
                      <td>
                        <input type="text"
                               class="form-control"
                               value="{{DateUtils.format(budget.dateEnd)}}"
                               disabled>
                      </td>
                    </tr>
                  </table>
                  <div class="budget-buttons mt-3 mb-1">
                    <button type="button"
                            class="btn btn-outline-secondary"
                            data-bs-toggle="tooltip"
                            data-bs-placement="bottom"
                            title="Details"
                            [routerLink]="'/budget'"
                            [queryParams]="{id: budget.id}">
                      <i class="bi bi-clipboard-data-fill"></i>
                    </button>
                    <button type="button"
                            class="btn btn-outline-warning"
                            data-bs-toggle="tooltip"
                            data-bs-placement="bottom"
                            title="Edit budget"
                            (click)="budgetModal.open(budget)">
                      <i class="bi bi-pencil-square"></i>
                    </button>
                    <button type="button"
                            class="btn btn-outline-danger"
                            data-bs-toggle="tooltip"
                            data-bs-placement="bottom"
                            title="Delete budget"
                            (click)="deleteModal.openWithBudget(budget)">
                      <i class="bi bi-trash3-fill"></i>
                    </button>
                  </div>
                </div>
              </ng-template>
            </div>
          }
        </div>
        <div class="mt-3">
          <app-pagination [displayPageSize]="false"
                          [pageCount]="2">

          </app-pagination>
        </div>
      </ng-template>
      <ng-template #errorBudgetsBlock>
        <app-error [errorModel]="errorModels.budgets"
                   [notFoundErrorText]="'Budgets not found'"></app-error>
      </ng-template>
    </ng-template>
    <app-budget-modal #budgetModal
                      (indexPageEvent)="onPageIndex($event)"
                      (budgetUpdateEvent)="onBudgetUpdate($event)">

    </app-budget-modal>
    <app-delete-modal #deleteModal
                      (indexPageEvent)="onPageIndex($event)">

    </app-delete-modal>
  </div>
</div>
