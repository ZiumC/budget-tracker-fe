<ng-template #errorModal let-modal>
    <div class="modal-header">
        <h4 class="modal-title" id="modal-basic-title">
            Error occurred
        </h4>
        <button
                type="button"
                class="btn-close"
                aria-label="Close"
                (click)="modal.close()">
        </button>
    </div>
    <div class="modal-body">
        <app-error-view [responseModel]="responseModel">
        </app-error-view>
    </div>
</ng-template>
