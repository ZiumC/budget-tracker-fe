<ng-template #deleteModal>
  @if (!displayLoader) {
    <div class="modal-header justify-content-center">
      <h3 class="modal-title text-danger" id="modal-basic-title">
        <i class="bi bi-question-circle"></i>
      </h3>
    </div>
  }
  <ng-template [ngIf]="displayLoader"
               [ngIfElse]="loadedBody">
    <div class="my-5"></div>
    <app-spinner [size]="SpinnerSize.MEDIUM"></app-spinner>
    <div class="mt-5 text-center">
      <p>Action in progress...</p>
    </div>
    <div class="mb-3"></div>
  </ng-template>
  <ng-template #loadedBody>
    <div class="modal-body col-mx text-center">
      <h5>This action can't be undone!</h5>
    </div>
    <div class="modal-footer">
      <div class="mx-auto">
        <button
          type="button"
          class="btn btn-outline-secondary mx-2"
          (click)="cancel()">
          Cancel
        </button>
        <button
          type="button"
          class="btn btn-outline-danger mx-2"
          (click)="delete()">
          Delete
        </button>
      </div>
    </div>
  </ng-template>
</ng-template>
<app-error-modal #errorModal>
</app-error-modal>
