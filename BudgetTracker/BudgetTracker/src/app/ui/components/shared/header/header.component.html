<ng-template [ngIf]="authService.isLoggedIn()">
  <nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
    <div class="container-fluid">
      <button (click)="navigateToHome()"
              class="btn btn-secondary"
              type="button">
        BudgetTracker
      </button>

      <label class="divider-m"></label>
      <button (click)="isMenuCollapsed = !isMenuCollapsed"
              class="navbar-toggler"
              type="button">
        &#9776;
      </button>

      <div [ngbCollapse]="isMenuCollapsed" class="collapse navbar-collapse">
        <label class="divider-block-xs"></label>
        <ul class="navbar-nav">
          <li (click)="navigateToCategories()"
              class="btn btn-light text-center mx-2 my-2">
            Categories <i class="bi bi-tags"></i>
          </li>
          <hr class="vertical mx-1"/>
          <li (click)="authService.logout()"
              class="btn btn-secondary mx-2 my-2">
            Log out <i class="bi bi-box-arrow-left"></i>
          </li>
        </ul>
        <label class="divider-block-xs"></label>
      </div>
    </div>
  </nav>
</ng-template>
