<div class="mx-auto">
  <form ngbAutofocus #form="ngForm">
    <div class="d-flex justify-content-center">
      <div class="mx-3">
        <button type="button"
                class="btn btn-outline-secondary"
                data-bs-toggle="tooltip"
                data-bs-placement="bottom"
                title="Previous page"
                (click)="previous()"
                [disabled]="form.invalid">
          <i class="bi bi-caret-left-fill"></i>
        </button>
      </div>
      <div class=" d-flex flex-nowrap align-items-center pagination-input">
        <label class="mx-1">Page</label>
        <input
          type="text"
          inputmode="numeric"
          id="page"
          name="page"
          min="1"
          class="form-control"
          [(ngModel)]="page"
          pattern="[1-9]*"
          required
          #pageInput="ngModel"
          [ngClass]="{
          'invalid-outline':
          pageInput.invalid}"/>
        <span class="col-form-label text-nowrap px-2">
          of 2
        </span>
      </div>
      <div class="mx-3">
        <button type="button"
                class="btn btn-outline-secondary"
                data-bs-toggle="tooltip"
                data-bs-placement="bottom"
                title="Next page"
                (click)="next()"
                [disabled]="(form.invalid && page > 0) || page <= -1">
          <i class="bi bi-caret-right-fill"></i>
        </button>
      </div>
    </div>
  </form>
</div>
