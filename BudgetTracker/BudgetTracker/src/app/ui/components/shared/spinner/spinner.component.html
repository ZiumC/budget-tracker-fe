<div class="spinner-container">
  @if (size == SpinnerSize.SMALL) {
    <div class="spinner-border text-secondary" role="status">
      <span class="sr-only"></span>
    </div>
  } @else if (size == SpinnerSize.MEDIUM) {
    <div class="spinner-border text-secondary spinner-m" role="status">
      <span class="sr-only"></span>
    </div>
  } @else {
    <div class="spinner-border text-secondary spinner-l" role="status">
      <span class="sr-only"></span>
    </div>
  }
</div>
