<div #incomeComponentPage>
  <ng-template [ngIf]="!incomeLoader"
               [ngIfElse]="loadedIncomesBlock">
    <app-spinner-grow></app-spinner-grow>
  </ng-template>
  <ng-template #loadedIncomesBlock>
    <ng-template [ngIf]="incomeResponseModel.statusCode == appConfig.response.required.incomeStatus"
                 [ngIfElse]="errorIncomesBlock">
      <div class="mb-3">
        <app-order [name]="'income-order'"
                   [orderTypes]="appConfig.request.order.incomeTypes"
                   [excludedOrderTypes]="appConfig.request.order.excludedTypes"
                   [orderDirections]="appConfig.request.order.orderDirections"
                   (orderByEvent)="onOrderEvent($event)"
                   (orderDirectionEvent)="onOrderEvent($event)">
        </app-order>
      </div>
      <hr class="horizontal">
      @for (income of incomesDto; track income) {
        <div ngbAccordion>
          <div ngbAccordionItem
               [collapsed]="selectedIncome !== income"
               [class.surplus-border]="income.isSurplus">
            <h2 ngbAccordionHeader>
              <button ngbAccordionButton
                      (click)="onIncomeSelect(income)"
                      class="light-gray-bg accordion-button-header">
                <table>
                  <tr class="table-header">
                    <th>Name</th>
                    <th>Income (PLN)</th>
                    <th [style.display]="displayMobileView() ? 'none' : ''">
                      Date created
                    </th>
                  </tr>
                  <tr>
                    <td>{{ income.name }}</td>
                    <td>{{ format(income.wage) }}</td>
                    <td [style.display]="displayMobileView() ? 'none' : ''">
                      {{ DateUtils.format(income.dateUpdated) }}
                    </td>
                  </tr>
                </table>
              </button>
            </h2>
            <div ngbAccordionCollapse>
              <div ngbAccordionBody class="text-center">
                <div class="row">
                  <div [style.display]="income.isSurplus ? '' : 'none'">
                    <p>Income <strong>is surplus</strong></p>
                  </div>
                </div>
                <div class="row">
                  <div class="mb-3 condition-container">
                    <div class="form-group">
                      <label for="category-assignment">Category
                      </label>
                      <input type="text"
                             id="category-assignment"
                             class="form-control mb-2"
                             placeholder="Not assigned"
                             value="{{income.assignment?.category?.name}}"
                             disabled>
                      <label for="category-assignment-comment">Assignment Comment
                      </label>
                      <textarea type="text"
                                id="category-assignment-comment"
                                class="form-control"
                                placeholder="{{income.assignment ? '' : 'Not assigned'}}"
                                value="{{ income.assignment?.comment }}"
                                disabled></textarea>
                    </div>
                  </div>
                </div>
                <div class="row">
                  <div class="income-buttons text-center">
                    <button
                      type="button"
                      class="btn btn-outline-warning"
                      data-bs-toggle="tooltip"
                      data-bs-placement="bottom"
                      title="Edit income"
                      (click)="incomeModal.open(income)">
                      <i class="bi bi-pencil-square"></i> Edit
                    </button>
                    <button
                      type="button"
                      class="btn btn-outline-danger"
                      data-bs-toggle="tooltip"
                      data-bs-placement="bottom"
                      title="Delete income"
                      (click)="deleteModal.openWithIncome(income)">
                      <i class="bi bi-trash3-fill"></i> Delete
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      }
      @if (incomeTotalPages! > 0) {
        <app-pagination [name]="'income-paginate'"
                        [pageCount]="incomeTotalPages!"
                        [displayPageSize]="true"
                        [pageSizeOptions]="appConfig.request.pagination.defaultPageSizeOptions"
                        (pageSizeEvent)="onPageSizeEvent($event)"
                        (pageEvent)="onPageEvent($event)">

        </app-pagination>
      }
    </ng-template>
  </ng-template>
  <ng-template #errorIncomesBlock>
    <app-error [response]="incomeResponseModel"
               [notFoundErrorText]="formatString(appConfig.form.messages.notFound,'Incomes data')">

    </app-error>
  </ng-template>
  <app-income-modal #incomeModal
                    [idBudget]="idBudget"
                    (refreshIncomeEvent)="onRefreshIncome()">

  </app-income-modal>
  <app-error-modal #errorModal>
  </app-error-modal>
  <app-delete-modal #deleteModal
                    (refreshIncomeEvent)="onRefreshIncome()">

  </app-delete-modal>
</div>
